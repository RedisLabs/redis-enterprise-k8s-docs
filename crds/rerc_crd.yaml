---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: redisenterpriseremoteclusters.app.redislabs.com
  labels:
    app: redis-enterprise
spec:
  group: app.redislabs.com
  names:
    kind: RedisEnterpriseRemoteCluster
    listKind: RedisEnterpriseRemoteClusterList
    plural: redisenterpriseremoteclusters
    singular: redisenterpriseremotecluster
    shortNames:
      - rerc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - jsonPath: .status.status
          name: Status
          type: string
        - jsonPath: .status.specStatus
          name: Spec Status
          type: string
        - jsonPath: .status.local
          name: Local
          type: string
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: Represents a remote participating cluster.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            status:
              properties:
                local:
                  description: Indicates whether this object represents a local or remote
                    cluster.
                  type: boolean
                specStatus:
                  description: Indicates whether the desired specification is valid.
                  type: string
                status:
                  description: Status of the remote cluster.
                  type: string
                observedGeneration:
                  description: Most recent generation observed for this RERC.
                    Corresponds to the RERC's generation, which is updated by the API Server.
                  type: integer
                internalObservedSecretResourceVersion:
                  description: Observed secret resource version.
                    For internal use only.
                  type: string
              type: object
            spec:
              properties:
                apiFqdnUrl:
                  description: URL of the cluster. Used for the Active-Active database URL.
                  type: string
                dbFqdnSuffix:
                  description: Database URL suffix. Used for the Active-Active database
                    replication endpoint and replication endpoint SNI.
                  type: string
                apiPort:
                  description: Port number of the cluster's URL. Used for connectivity and
                    synchronization.
                  type: integer
                recNamespace:
                  description: Namespace of the REC that this RERC points to.
                  type: string
                recName:
                  description: Name of the REC that this RERC points to.
                  type: string
                secretName:
                  description: 'Name of the secret containing cluster credentials.
                    Must use the following format: "redis-enterprise-<RERC name>".'
                  type: string
              required:
                - apiFqdnUrl
                - recName
                - recNamespace
              type: object
          type: object
